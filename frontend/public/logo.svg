<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 58" width="300" height="58">
  <defs>
    <linearGradient id="boldGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0d070"/>
      <stop offset="45%"  stop-color="#c89030"/>
      <stop offset="100%" stop-color="#9a6a10"/>
    </linearGradient>
    <linearGradient id="lightGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe090"/>
      <stop offset="45%"  stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#b07820"/>
    </linearGradient>
  </defs>

  <!-- Full wordmark in one text block using tspan for weight contrast -->
  <!-- Render twice: shadow layer first, then fill -->

  <!-- TRENDZY — main text -->
  <text y="40"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="42">
    <tspan x="0" font-weight="700" letter-spacing="2" fill="url(#boldGold)">TREND</tspan><tspan font-weight="300" letter-spacing="2" fill="url(#lightGold)">ZY</tspan>
  </text>

  <!-- thin divider line -->
  <line x1="0" y1="46" x2="264" y2="46"
        stroke="#c89030" stroke-width="0.5" opacity="0.45"/>

  <!-- tagline -->
  <text x="1" y="55"
        font-family="'Jost', 'Gill Sans', Arial, sans-serif"
        font-size="7.5" font-weight="400" letter-spacing="4.2"
        fill="#c89030" opacity="0.8">EVERYTHING YOU LOVE</text>
</svg>
