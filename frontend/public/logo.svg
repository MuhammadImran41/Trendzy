<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <linearGradient id="goldBold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5d160"/>
      <stop offset="50%"  stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe090"/>
      <stop offset="50%"  stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#a07820"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#2d2010"/>
    </linearGradient>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="6" width="50" height="50" rx="10" fill="url(#iconBg)"/>
  <rect x="0" y="6" width="50" height="3" rx="3" fill="url(#goldBold)"/>

  <!-- TZ in icon -->
  <text x="25" y="40"
        font-family="'Georgia', serif"
        font-size="22"
        font-weight="700"
        text-anchor="middle"
        fill="url(#goldBold)"
        letter-spacing="1">TZ</text>

  <!-- Wordmark TRENDZY -->
  <text y="40" x="64"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="38">
    <tspan font-weight="700" letter-spacing="2" fill="url(#goldBold)">TREND</tspan><tspan font-weight="300" letter-spacing="3" fill="url(#goldLight)">ZY</tspan>
  </text>

  <!-- Divider line -->
  <line x1="64" y1="47" x2="316" y2="47"
        stroke="#c9a96e" stroke-width="0.6" opacity="0.4"/>

  <!-- Tagline -->
  <text x="65" y="57"
        font-family="'Inter', 'Gill Sans', Arial, sans-serif"
        font-size="7" font-weight="500" letter-spacing="4.5"
        fill="#c9a96e" opacity="0.75">PREMIUM FASHION · PAKISTAN</text>
</svg>
